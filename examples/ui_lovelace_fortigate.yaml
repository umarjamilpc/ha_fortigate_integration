title: FortiGate
views:
  - title: Overview
    icon: mdi:view-dashboard
    badges: []
    card_mod:
      style: |
        #view view {
          padding: 16px;
          background: linear-gradient(160deg, rgba(10, 14, 22, 0.97) 0%, rgba(16, 24, 40, 0.97) 100%);
        }
    cards: []
    background:
      opacity: 100
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      image:
        media_content_id: media-source://image_upload/a1d326b07b8cfb9aba0eceadf36ddccc
        media_content_type: image/jpeg
        metadata:
          title: blur-image.jpg
          thumbnail: /api/image/serve/a1d326b07b8cfb9aba0eceadf36ddccc/256x256
          media_class: image
          children_media_class: null
          navigateIds:
            - {}
            - media_content_type: app
              media_content_id: media-source://image_upload
    type: sections
    theme: ios-dark-mode-dark-blue
    subview: false
    sections:
      - type: grid
        cards:
          - type: heading
            heading: New section
          - type: entities
            title: ⏱ System
            state_color: true
            show_header_toggle: false
            entities:
              - entity: sensor.fortigate_uptime
                name: Uptime
                icon: mdi:clock-outline
              - entity: sensor.fortigate_firmware_version
                name: Firmware
                icon: mdi:chip
              - entity: sensor.fortigate_sessions
                name: Sessions
                icon: mdi:connection
            card_mod:
              style: >
                ha-card { background: rgba(18, 26, 38, 0.82) !important;
                backdrop-filter: blur(14px); border-radius: 16px; border: 1px
                solid rgba(200, 215, 235, 0.18); box-shadow: 0 8px 32px rgba(0,
                0, 0, 0.35); }

                .card-header { color: rgba(200, 215, 235, 0.9); font-weight:
                600; border-bottom: 1px solid rgba(200, 215, 235, 0.12); }

                .info { color: rgba(255, 255, 255, 0.85); }
            grid_options:
              columns: 16
              rows: auto
          - type: entities
            title: 📊 Resource usage
            state_color: true
            show_header_toggle: false
            entities:
              - entity: sensor.fortigate_cpu_usage
                name: CPU
                icon: mdi:chip
              - entity: sensor.fortigate_memory_usage
                name: Memory
                icon: mdi:memory
              - entity: sensor.fortigate_spu_sessions
                name: SPU sessions
                icon: mdi:chip
              - entity: sensor.fortigate_nturbo_sessions
                name: nTurbo sessions
                icon: mdi:speedometer
            card_mod:
              style: >
                ha-card { background: rgba(18, 26, 38, 0.82) !important;
                backdrop-filter: blur(14px); border-radius: 16px; border: 1px
                solid rgba(200, 215, 235, 0.18); box-shadow: 0 8px 32px rgba(0,
                0, 0, 0.35); }

                .card-header { color: rgba(200, 215, 235, 0.9); font-weight:
                600; border-bottom: 1px solid rgba(200, 215, 235, 0.12); }

                .info { color: rgba(255, 255, 255, 0.85); }
            grid_options:
              columns: 16
              rows: auto
          - type: entities
            title: Link state
            state_color: true
            show_header_toggle: false
            entities:
              - entity: binary_sensor.wan1_link
